name: Keep Only Ultrakill

on:
  workflow_dispatch:   # lets you trigger it manually from the Actions tab

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Remove everything except ultrakill
        run: |
          shopt -s extglob
          rm -rf !(ultrakill)

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Keep only ultrakill folder"

      - name: Push to new branch
        run: |
          git push origin HEAD:ultrakill-only

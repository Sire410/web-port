name: Ultrakill Folder Release

on:
  workflow_dispatch:   # run manually from the Actions tab

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout only ultrakill folder
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
          sparse-checkout: ultrakill
          sparse-checkout-cone-mode: true

      - name: Zip ultrakill folder
        run: zip -r ultrakill.zip ultrakill

      - name: Create release with ultrakill.zip
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ultrakill-v1.0
          name: Ultrakill Folder Release
          body: |
            This release contains only the `ultrakill` folder from the repo.
          files: ultrakill.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

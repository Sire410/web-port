name: Flatten Unity WebGL Build

on:
  workflow_dispatch:

jobs:
  flatten:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Move Build and TemplateData files to root
        run: |
          mv Build/* . || true
          mv TemplateData/* . || true
          rm -rf Build TemplateData

      - name: Update index.html paths
        run: |
          sed -i 's|Build/||g' index.html
          sed -i 's|TemplateData/||g' index.html

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Flattened Unity build to repo root and updated index.html paths"
          git push

